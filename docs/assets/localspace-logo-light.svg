  <rect x="156" y="164" width="200" height="168" rx="32" fill="url(#terminal)"/>
  <rect x="178" y="188" width="156" height="18" rx="9" fill="#334155"/>
  <circle cx="193" cy="197" r="5" fill="#38BDF8"/>
  <circle cx="211" cy="197" r="5" fill="#818CF8"/>
  <circle cx="229" cy="197" r="5" fill="#C084FC"/>
