<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">LocalSpace logo</title>
  <desc id="desc">A rounded square app icon with a local terminal window inside a clean secure orbital workspace boundary.</desc>
  <defs>
    <linearGradient id="bg" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F6FB"/>
    </linearGradient>
    <linearGradient id="orbit" x1="112" y1="112" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="terminal" x1="155" y1="154" x2="357" y2="358" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <filter id="shadow" x="36" y="38" width="440" height="440" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="48" y="48" width="416" height="416" rx="104" fill="url(#bg)" filter="url(#shadow)"/>
